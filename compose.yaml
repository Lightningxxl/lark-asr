name: ${COMPOSE_PROJECT_NAME:-lark-asr}

x-lark-asr-common: &lark-asr-common
  restart: unless-stopped
  environment:
    HOME: /home/app
    LARK_CLI_NO_PROXY: "1"
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./config/config.toml:/config/config.toml:ro
    - ./data:/data
    - ./work:/work
    - ${LARK_CLI_CONFIG_DIR:?set LARK_CLI_CONFIG_DIR in .env}:/secrets/lark-cli

services:
  hook:
    <<: *lark-asr-common
    image: ${LARK_ASR_APP_IMAGE:-lark-asr/app:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_BASE_IMAGE: ${APP_BASE_IMAGE:-node:22-bookworm-slim}
        LARK_CLI_VERSION: ${LARK_CLI_VERSION:-1.0.14}
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.125.0}
    command: ["hook", "--config", "/config/config.toml"]

  worker:
    <<: *lark-asr-common
    image: ${LARK_ASR_ASR_IMAGE:-lark-asr/asr:local}
    build:
      context: .
      dockerfile: docker/Dockerfile.asr
      args:
        ASR_BASE_IMAGE: ${ASR_BASE_IMAGE:-nvidia/cuda:13.0.2-cudnn-runtime-ubuntu24.04}
        LARK_CLI_VERSION: ${LARK_CLI_VERSION:-1.0.14}
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.125.0}
    command: ["worker", "--config", "/config/config.toml", "--interval", "${WORKER_INTERVAL:-20}"]
    gpus: all
    environment:
      HOME: /home/app
      LARK_CLI_NO_PROXY: "1"
      PYTHONUNBUFFERED: "1"
      HF_HOME: /models/.cache/huggingface
      MODELSCOPE_CACHE: /models/.cache/modelscope
    volumes:
      - ./config/config.toml:/config/config.toml:ro
      - ./data:/data
      - ./work:/work
      - ${LARK_CLI_CONFIG_DIR:?set LARK_CLI_CONFIG_DIR in .env}:/secrets/lark-cli
      - ${CODEX_HOME:?set CODEX_HOME in .env}:/home/app/.codex
      - ${KNOWLEDGEBASE_DIR:?set KNOWLEDGEBASE_DIR in .env}:/knowledgebase
      - ${MODELS_DIR:-./models}:/models
